name: Release

# release-please maintains the CHANGELOG, version bump, release PR, and the
# GitHub release + tag — all via the default GITHUB_TOKEN (no secrets needed).
# Publishing to npm is done manually/locally (`npm publish`); there is no CI
# publish job and no NPM_TOKEN.

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: googleapis/release-please-action@8b8fd2cc23b2e18957157a9d923d75aa0c6f6ad5 # v4
        with:
          release-type: node
